<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Krapowkaidao — indie iOS studio</title>
  <meta name="description" content="Krapowkaidao is an indie iOS studio in Bangkok. We make insanely simple software.">
  <style>
    :root {
      --ink: #1a1a1a;
      --muted: #666;
      --accent: #c2410c;
      --bg: #fafaf7;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 540px;
      text-align: left;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 4rem);
      letter-spacing: -0.03em;
      margin: 0 0 8px;
      font-weight: 700;
    }
    .tag {
      color: var(--muted);
      font-size: 1rem;
      margin: 0 0 32px;
      letter-spacing: 0.01em;
    }
    .lead {
      font-size: 1.15rem;
      margin: 0 0 24px;
    }
    .accent { color: var(--accent); }
    footer {
      margin-top: 48px;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Krapowkaidao</h1>
    <p class="tag">Indie iOS studio · Bangkok</p>
    <p class="lead">
      We make <span class="accent">insanely simple</span> software.
      Like its namesake — Thailand's most-ordered no-decision dish —
      our apps are designed to be reached for without thinking.
    </p>
    <p class="lead">First app coming soon.</p>
    <footer>© 2026 Krapowkaidao</footer>
  </main>
</body>
</html>
